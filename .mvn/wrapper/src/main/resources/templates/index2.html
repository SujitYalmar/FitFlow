<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts</title>
</head>
<body>
<section>
    <section class="ff-page-header">
        <div>
            <p class="ff-kicker">Workout plans</p>
            <h1>Choose a focused routine.</h1>
            <p>Start with a full-body challenge or target a specific body area.</p>
        </div>
        <a class="ff-btn ff-btn-primary" href="workouts/add">Log Workout</a>
    </section>

    <section class="ff-section">
        <div class="ff-plan-grid">
            <a class="ff-plan-card featured" href="pushup" style="background-image:url('/images/f2.jpg')">
                <span>7 x 4 Challenge</span>
                <strong>Full Body Workout</strong>
            </a>
            <a class="ff-plan-card" href="jumpingjack1" style="background-image:url('/images/f4.jpg')">
                <span>Body Focus</span>
                <strong>Chest Workout</strong>
            </a>
            <a class="ff-plan-card" href="jumpingjack2" style="background-image:url('/images/bg6.jpg')">
                <span>Body Focus</span>
                <strong>Abs Workout</strong>
            </a>
            <a class="ff-plan-card" href="jumpingjack3" style="background-image:url('/images/f3.jpg')">
                <span>Body Focus</span>
                <strong>Shoulder & Back</strong>
            </a>
            <a class="ff-plan-card" href="pushrotate4" style="background-image:url('/images/f5.jpg')">
                <span>Body Focus</span>
                <strong>Arm Workout</strong>
            </a>
            <a class="ff-plan-card" href="jumpingjack5" style="background-image:url('/images/f7.jpg')">
                <span>Body Focus</span>
                <strong>Leg Workout</strong>
            </a>
        </div>
    </section>
</section>
</body>
</html>
