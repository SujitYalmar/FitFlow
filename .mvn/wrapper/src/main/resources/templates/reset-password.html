<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
	<link rel="stylesheet" type="text/css" href="/css/resetpass.css">
</head>
<body  class="background-profile-update">
    <form action="/password/reset" method="post">
		<h1>Reset Password</h1>
		<label for="email">Enter email id:</label>
		<input type="text" name="email" id="email">
        <label for="newPassword">New Password:</label>
		    <div style="position: relative;">
		        <input type="password" id="password" name="password" required 
		               minlength="8" 
		               pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" 
		               title="Password must be at least 8 characters long, contain at least one uppercase letter, one lowercase letter, one number, and one special character (@$!%*?&)."
		               onblur="validatePassword()">
		        <span id="eye-icon" onclick="togglePasswordVisibility()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
		            👁️
		        </span>
		    </div>
		</div>

        <button type="submit" class="button1">Reset Password</button>
		<p th:if="${param.resetSuccess}" style="color:green;">Your password has been reset successfully. You can now log in.</p>

    </form>
	<script>
	function validatePassword() {
	    var password = document.getElementById("password").value;

	    // Check if the password meets the required pattern
	    var passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

	    if (!passwordPattern.test(password)) {
	        alert("Password must be at least 8 characters long, contain at least one uppercase letter, one lowercase letter, one number, and one special character (@$!%*?&).");
	        return false; // Prevent form submission if password doesn't match the pattern
	    }

	    // Allow form submission if password is valid
	    return true;
	}

	function togglePasswordVisibility() {
	    var passwordField = document.getElementById("password");
	    var eyeIcon = document.getElementById("eye-icon");

	    // Toggle password visibility
	    if (passwordField.type === "password") {
	        passwordField.type = "text";
	        eyeIcon.textContent = "🙈"; // Change icon to a closed eye when visible
	    } else {
	        passwordField.type = "password";
	        eyeIcon.textContent = "👁️"; // Change icon to an open eye when hidden
	    }
	}
	</script>




</body>
</html>
