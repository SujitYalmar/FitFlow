<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
<section class="auth-page">
    <div class="auth-copy">
        <p class="ff-kicker">Welcome back</p>
        <h1>Log in and keep your momentum.</h1>
        <p>Track workouts, review progress, and jump back into your fitness plan.</p>
    </div>

    <form class="auth-card" action="userLogin" method="post">
        <h2>Login</h2>
        <th:block th:if="${param.error}">
            <p class="auth-message error">[[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]</p>
        </th:block>
        <th:block th:if="${param.logout}">
            <p class="auth-message success">Logout successfully</p>
        </th:block>

        <label for="username">Email</label>
        <input id="username" type="email" placeholder="you@example.com" name="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" name="password" required>

        <button class="button1" type="submit">Log In</button>

        <div class="auth-links">
            <a href="forgot-password">Forgot password?</a>
            <a href="register">Create account</a>
        </div>
    </form>
</section>
</body>
</html>
