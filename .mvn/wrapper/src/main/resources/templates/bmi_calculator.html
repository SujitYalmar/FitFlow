 <!DOCTYPE html>
 <html lang="en" xmlns:th="http://www.thymeleaf.org"
 	th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Fitness webapplication</title>
	<link rel="preconnect" href="https://fonts.gstatic.com">
	 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
	 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<section style="background-color: lightcyan">
<body style="background-color:  lightcyan">
	<section style="background-color:  lightcyan">
		    <style media="screen">
		    	*,
		*:before,
		*:after{
		    padding: 0;
		    margin: 0;
		    box-sizing: border-box;
		}

		.bck-btn{
		 margin-left:2rem;
		 font-size:25px;
		 }
		.container{
		    background-color: #ffffff;
		    padding: 30px 30px;   
		    width: 400px;
		    position: absolute;
		    transform: translate(-50%,-50%);
		    top: 50%;
		    left: 50%;
		    border-radius: 5px;
		    font-family: 'Poppins',sans-serif;
		    box-shadow: 25px 25px 30px rgba(0,0,0,0.15);
		}
		.container h1{
			 background: linear-gradient(to right, #4facfe 0%,#00f2fe 100%);
			color: white;
			text-align: center;
			font-size: 23px;
			letter-spacing: 1px;
			margin-top: -30px;
			margin-left: -30px;
			margin-right: -30px;
			margin-bottom: 40px;
		}
		.row{
		    display: flex;
		    align-items: center;
		    justify-content: space-between;
		    margin-bottom: 40px;
		}
		.row span{
		    font-weight: 500;
		}
		input[type="range"]{
		    width: 70%;
		    height: 3.5px;
		    -webkit-appearance: none;
		    appearance: none;
		    background-color: #dcdcdc;
		    border-radius: 3px;
		    outline: none;
		}
		input[type="range"]::-webkit-slider-thumb{
		    -webkit-appearance: none;
		    appearance: none;
		    height: 15px;
		    width: 15px;
		    background-color: #1c1c1c;
		    border-radius: 50%;
		    cursor: pointer;
		}
		#result{
		    font-size: 30px;
		    font-weight: 700;
		    letter-spacing: 1px;
		    text-align: center;
		    color: #0be881;
		}
		#category{
		    font-size: 18px;
		    text-align: center;
		    letter-spacing: 1px;
		}
		.display{
		box-shadow: 0 0 20px rgba(0,139,253,0.25);
		margin-bottom: 60px;
		}
		    </style>

<section style="background-color:  lightcyan">

<div class="bck-btn">
<a href="/home1" style="text-decoration: none;">
<i class="fa fa-arrow-circle-left"></i>Back</a>
</div>
    <div class="container">
			<h1>BMI Calculator</h1>
			<div class="display">
				        <p id="result">20.0</p>
				        <p id="category">Normal weight</p>
			</div>
        <div class="row">
            <input type="range" min="20" max="200" value="20" id="weight" oninput="calculate()">
            <span id="weight-val">20 kg</span>
        </div>
        <div class="row">
            <input type="range" min="100" max="250" value="100" id="height" oninput="calculate()">
            <span id="height-val">100 cm</span>
        </div>


    </div>


	</section>
    <!--Script-->
    <script type="text/javascript">
function calculate(){
    var bmi;
    var result = document.getElementById("result");

    var weight = parseInt(document.getElementById("weight").value);
    document.getElementById("weight-val").textContent = weight + " kg";

    var height = parseInt(document.getElementById("height").value);
    document.getElementById("height-val").textContent = height + " cm";

    bmi = (weight / Math.pow( (height/100), 2 )).toFixed(1);
    result.textContent = bmi;

    if(bmi < 18.5){
        category = "Underweight 😒";
        result.style.color = "#ffc44d";
    }
    else if( bmi >= 18.5 && bmi <= 24.9 ){
        category = "Normal Weight 😍";
        result.style.color = "#0be881";
    }
    else if( bmi >= 25 && bmi <= 29.9 ){
        category = "Overweight 😮";
        result.style.color = "#ff884d";
    }
    else{
        category = "Obese 😱";
        result.style.color = "#ff5e57";
    }
    document.getElementById("category").textContent = category;
}
    </script>

	</section>
</body>
</section>
</html>
