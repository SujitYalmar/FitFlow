<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
<section class="ff-form-page profile-page">
    <div class="ff-form-copy">
        <p class="ff-kicker">Profile</p>
        <h1>Keep your details current.</h1>
        <p>Your profile keeps FitFlow personalized across workouts, reports, and goals.</p>
    </div>

    <form class="ff-form-card" th:action="@{/update}" th:object="${user}" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" required>

        <label for="fitness_goal">Fitness goal</label>
        <input type="text" id="fitness_goal" th:field="*{fitness_goal}" required>

        <label for="mobileNo">Mobile</label>
        <input type="tel" id="mobileNo" th:field="*{mobileNo}" required>

        <input type="hidden" th:field="*{id}">
        <button type="submit" class="ff-btn ff-btn-primary">Update Profile</button>
    </form>
</section>
</body>
</html>
