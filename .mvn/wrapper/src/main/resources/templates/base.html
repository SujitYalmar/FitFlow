<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:fragment="layout(content)">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="/css/styles.css">
	<style>
	
		.navbar {
		    background-color: #343a40 !important; /* Dark background for the navbar */
		}

		.navbar-nav {
		    display: flex !important;
		    justify-content: flex-end !important; /* Align the navbar items to the right */
		    width: 100% !important;
		}

		.nav-item {
		    margin-right: 20px ;
		}

		/* Navigation items */
		.navbar-nav .nav-link {
		    color: white !important; /* Default link color */
		    text-decoration: none !important;
		    font-size: 1rem !important;
		    position: relative !important; /* Position relative to the element */
		    transition: color 0.3s ease !important; /* Smooth transition for color changes */
		}

		/* Add a black underline on hover and animate its width */
		.navbar-nav .nav-link::after {
		    content: ""; /* Create the underline */
		    position: absolute;
		    bottom: 0; /* Place it at the bottom of the link */
		    left: 0;
		    width: 0; /* Initially, the width is 0 (hidden) */
		    height: 2px; /* Line thickness */
		    background-color: #000; /* Black color for the underline */
		    transition: width 0.3s ease !important; /* Animate width increase */
		}

		/* Hover effect - underline expands */
		.navbar-nav .nav-link:hover::after {
		    width: 100%; /* Expand the underline to full width */
		}

		/* Active state (after click) */
		.navbar-nav .nav-link:active {
		    color: #ffffff !important; /* White text when active */
		    background-color: rgba(0, 123, 255, 0.5) !important; /* Stronger blue background when clicked */
		    filter: blur(2px) !important; /* Slightly stronger blur effect on active state */
		    border-bottom: 2px solid #000 !important; /* Black underline below the clicked link */
		}

		/* Submenu for profile settings */
		.user-pic {
		    cursor: pointer !important;
		}

		/* Media Query for screens wider than 2500px */
		@media (min-width: 6000px) {
		    .navbar-nav {
		        justify-content: flex-end ; /* Align the navbar items to the right */
		    }

		    .navbar-nav .nav-item {
		        margin-right: 30px !important; /* Add more space between items */
		    }
			.navbar-nav .logo1 {
			    margin-right: 900px !important; /* Add more space between items */
				float: right;           /* Pushes the content to the right */
				background-color: lightgray;
				padding: 10px;
			}

		}

		/* Styling for the logo text */
		.navbar-brand {
		    font-size: 2rem;
		    font-weight: bold;
		    color: #ffffff !important; /* Logo text color */
		    margin-right: auto; /* Push logo to the left side */
		    text-transform: uppercase; /* Capitalize letters */
		}

	</style>
</head>
<body>
	<!-- start navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark r">
		<div class="container-fluid">
			<!-- Logo on the left side -->
			<a class="navbar-brand" href="/">Fitness</a> <!-- Logo Text -->

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					
					<th:block th:if="${user==NULL}">
			     <a class="new" href="register">Register</a>
						<a class="new1" href="signin">Login</a>
					</th:block>
					<th:block th:if="${user!=NULL}">
					
					<li class="nav-item"><a class="nav-link" href="home1">Progress</a></li>
					<li class="nav-item"><a class="nav-link" href="workouts">Workouts</a></li>
					<li class="nav-item"><a class="nav-link" href="yoga">Yoga</a></li>
					<li class="nav-item"><a class="nav-link" href="workouth">Report</a></li>
					<li class="nav-item"><a class="nav-link" href="index">Gym</a></li>


					<section>
						<link rel="stylesheet" type="text/css" href="/css/profile2.css">
						<div class="hero">
							<nav>
								<img th:src="@{/uploads/{username}.jpg(username=${user.id})}" class="user-pic" onclick="ToggleMenu()"/>
								<form action="/upload" method="post" enctype="multipart/form-data">
								<div class="sub-menu-wrap" id="subMenu">
									<div class="sub-menu">
										<div class="user-info">
											<img th:src="@{/uploads/{username}.jpg(username=${user.id})}" alt="User Image" />
											<h2>[[${user.name}]]</h2>

										</div>
										<hr>
										<a href="#" class="sub-menu-link">
											<p><input type="file" id="profilePic" name="profilePic" accept="image/*" class="btn-custom">
											<label for="profilePic">change profile pic</label>
											<button type="submit" class="btn-custom">Update</button>

										</p>
											
											<span></span>
										</a>

										<a  style="display: flex;
										align-items: center;
										text-decoration: none;
										color: #525252;	margin: 12px 0;">
											<img src"images/">
											  <p>Fitness goal::[[${user.fitness_goal}]]</p>
											<span></span>
										</a>
										<a style="display: flex;align-items: center;
										text-decoration: none;
										color: #525252;
										margin: 12px 0;">
											<img src"images/">
											  <p>[[${user.email}]]</p>
											<span></span>
										</a>
										<a  href="/profile" class="sub-menu-link">
											<img src"images/">
											  <p>Edit Details</p>
											<span></span>
										</a>


										<a href="/logout" class="sub-menu-link">
											<img src"images/">
											<p>logout</p>
											<span></span>
											
										</a>
										<a  href="/delete" class="sub-menu-link">
											<img src"images/">
											<p class="btn-custom1">close account</p>
											<span></span>
										</a>


									</div>
								</div>
							</nav>
						</div>
					</section>
					</th:block>

				</ul>
			</div>
		</div>
	</nav>
	<!-- End Navbar -->
	
	<div th:replace="${content}"></div>  <!-- Here `${content}` should be a template fragment or variable -->

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous">
	</script>
	<script>
		let subMenu= document.getElementById("subMenu");
		function ToggleMenu(){
			subMenu.classList.toggle("open-menu");
		}
	</script>
</body>
</html>
