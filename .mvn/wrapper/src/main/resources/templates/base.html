<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:fragment="layout(content)">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlow</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="/css/styles.css">
</head>
<body>
	<!-- start navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark r app-navbar">
		<div class="container-fluid">
			<!-- Logo on the left side -->
			<a class="navbar-brand" href="/">FitFlow</a> <!-- Logo Text -->

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					
					<th:block th:if="${user==NULL}">
						<li class="nav-item"><a class="new" href="register">Register</a></li>
						<li class="nav-item"><a class="new1" href="signin">Login</a></li>
					</th:block>
					<th:block th:if="${user!=NULL}">
					
					<li class="nav-item"><a class="nav-link" href="home1">Progress</a></li>
					<li class="nav-item"><a class="nav-link" href="workouts">Workouts</a></li>
					<li class="nav-item"><a class="nav-link" href="yoga">Yoga</a></li>
					<li class="nav-item"><a class="nav-link" href="workouth">Report</a></li>
					<li class="nav-item"><a class="nav-link" href="index">Gym</a></li>


					<li class="nav-item profile-nav">
						<button class="profile-trigger" type="button" onclick="ToggleMenu()" aria-label="Open profile menu">
							<img th:src="@{/uploads/{username}.jpg(username=${user.id})}" class="user-pic" alt="" onerror="this.onerror=null;this.src='/images/trophy.jpg';"/>
							<span th:text="${user.name}">Profile</span>
						</button>
						<div class="sub-menu-wrap" id="subMenu">
							<div class="sub-menu">
								<div class="user-info">
									<img th:src="@{/uploads/{username}.jpg(username=${user.id})}" alt="" onerror="this.onerror=null;this.src='/images/trophy.jpg';"/>
									<div>
										<h2 th:text="${user.name}">User</h2>
										<p th:text="${user.email}">email@example.com</p>
									</div>
								</div>
								<div class="profile-meta">
									<span>Goal</span>
									<strong th:text="${user.fitness_goal}">Fitness goal</strong>
								</div>
								<form class="profile-upload" action="/upload" method="post" enctype="multipart/form-data">
									<input type="file" id="profilePic" name="profilePic" accept="image/*">
									<label for="profilePic">Choose photo</label>
									<button type="submit">Upload</button>
								</form>
								<a href="/profile" class="sub-menu-link">Edit profile</a>
								<a href="/logout" class="sub-menu-link">Logout</a>
								<a href="/delete" class="sub-menu-link danger">Close account</a>
							</div>
						</div>
					</li>
					</th:block>

				</ul>
			</div>
		</div>
	</nav>
	<!-- End Navbar -->
	
	<main class="app-shell" th:replace="${content}"></main>  <!-- Here `${content}` should be a template fragment or variable -->

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous">
	</script>
	<script>
		let subMenu= document.getElementById("subMenu");
		function ToggleMenu(){
			if (subMenu) {
				subMenu.classList.toggle("open-menu");
			}
		}
	</script>
</body>
</html>
