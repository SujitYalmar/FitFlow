	      h2 span{

	      .testimonial {
	  background-color: white;
	  text-align: center;
	  padding: 30px 30px 50px;
	  margin: 100px 15px 420px;
	  position: relative;
	}

	.testimonial::before,
	.testimonial::after {
	  content: "";
	  border-top: 40px solid white;
	  border-right: 125px solid transparent;
	  position: absolute;
	  bottom: -40px;
	  left: 0;
	}

	.testimonial::after {
	  border-right: none;
	  border-left: 125px solid transparent;
	  left: auto;
	  right: 0;
	}

	.testimonial .icon {
	  display: inline-block;
	  font-size: 80px;
	  color: #016d9b;
	  margin-bottom: 20px;
	  opacity: 0.6;
	}

	.testimonial .description {
	  font-size: 14px;
	  color: #777;
	  text-align: justify;
	  margin-bottom: 30px;
	  opacity: 0.9;
	}

	.testimonial .testimonial-content {
	  width: 100%;
	  left: 0;
	  position: absolute;
	}

	.testimonial .pic {
	  display: inline-block;
	  border: 4px solid white;
	  border-radius: 50%;
	  box-shadow: 0 0 2px 2px #016d9b;
	  overflow: hidden;
	  z-index: 1;
	  position: relative;
	}

	.testimonial .pic img {
	  width: 100%;
	  height: auto;
	}

	.testimonial .name {
	  font-size: 25px;
	  font-weight: bold;
	  color: white;
	  text-transform: capitalize;
	  margin: 10px 0 5px 0;
	}

	.testimonial .title {
	  display: block;
	  font-size: 19px;
	  color: #ffd9b8;
	}

	.owl-controls {
	  margin-top: 20px;
	}

	.owl-pagination {
	  display: flex;
	  justify-content: center;
	}

	.owl-page {
	  height: 10px;
	  width: 40px;
	  background-color: rgba(255, 255, 255, 0.2);
	  border-radius: 10%;
	}

	.owl-page:hover,
	.owl-page.active {
	  background-color: rgba(255, 255, 255, 0.3);
	}

	.owl-page:not(first-item) {
	  margin-left: 10px;
	}

	*{box-sizing:border-box;
	  margin:0;
	}

	.mains{
	  
	  display: flex;

	  height: 100vh;
	  margin: -20px 0 20px;
	}

	.container123 {
	  
	  background-color: white;
	  border-radius: 5px;
	    box-shadow: 0 14px 28px rgba(0,0,0,0.25), 
	      0 10px 10px rgba(0,0,0,0.22);
	  position: relative;
	  overflow: hidden;
	  margin:auto;
	  width: 768px;
	  max-width: 100%;
	  min-height: 540px;
	        min-width:370px;
	}
	h2{
	  font-size:2rem;
	  margin-bottom:1rem;
	}
	.form-container {
	  display:flex;
	}
	.left-container {
	  flex:1;
	  height:480px;
	  background-color:teal;
	}
	.right-container {
	  display:flex;
	  flex:1;
	  height:460px;
	  background-color: white;
	  justify-content:center;
	  align-items:center;
	}
	.left-container {
	  display:flex;
	  flex:1;
	  height:480px;
	  justify-content:center;
	  align-items:center;
	    color:white;
	}
	.left-container p {
	  font-size:0.9rem;
	}
	.right-inner-container {
	  width:70%;
	  height:80%;
	  text-align:center;
	}
	.left-inner-container {
	  height:50%;
	  width:80%;
	  text-align:center;
	  line-height:5px;
	}
	input, textarea {
	  background-color: #eee;
	  border: none;
	  padding: 12px 15px;
	  margin: 8px 0;
	  width: 100%;
	  font-size:0.8rem;
	}
	input:focus, textarea:focus{
	  outline:1px solid teal;
	}
	button {
	  border-radius: 20px;
	  border: 1px solid #00b4cf;
	  background:linear-gradient(to right, #4facfe 0%,#00f2fe 100%);
	  color: #FFFFFF;
	  font-size: 12px;
	  font-weight: bold;
	  padding: 12px 45px;
	  letter-spacing: 1px;
	  text-transform: uppercase;
	  transition: transform 80ms ease-in;
	  cursor:pointer;
	}

	button:hover {
	  background:linear-gradient(to right, #00f2fe 0%,#4facfe 100%);
	}
	.btn-btn-primary{
	background-color:#ee82ee;
	}
	@media only screen and (max-width: 600px) {
	  .left-container{
	    display: none;
	  }
	  .lg-view {
	    display:none;  
	  }
	  
	}
	@media only screen and (min-width: 600px) {
	  .sm-view {
	    display:none;  
	  }
	}
	form p {
	  text-align:left;
	}
