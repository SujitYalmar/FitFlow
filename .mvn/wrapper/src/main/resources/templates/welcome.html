	<style>
	    /* Style for the chart container */
	    .chart-container {
	        width: 80%;           /* Set the width of the chart container */
	        margin: 0 auto;       /* Center the chart container horizontally */
	        padding: 20px;        /* Add padding for spacing */
	        border: 1px solid #ddd; /* Optional: add a border around the chart */
	        border-radius: 10px;  /* Optional: round the corners */
	        background-color: #f9f9f9; /* Optional: background color */
	    }

	    /* Style for the chart itself */
	    #workoutChart {
	        width: 100% !important; /* Make the chart take up the full width of the container */
	        height: 400px !important; /* Set the height of the chart */
	    }

	    /* General body styling */
	    body {
	        font-family: Arial, sans-serif; /* Choose a clean font */
	        background-color: #f4f4f4;     /* Background color for the whole page */
	        margin: 0;
	        padding: 0;
	    }

	    h1 {
	        text-align: center; /* Center the header */
	        color: #333;
	    }

	    h2 {
	        text-align: center; /* Center the sub-header */
	        color: #444;
	    }
	</style>

    <h1>Welcome</h1>

    <h2>Your Workout Report</h2>
    
    <!-- Chart Container -->
    <div class="chart-container">
        <!-- Canvas for the Chart -->
        <canvas id="workoutChart"></canvas>
    </div>
	    <!-- --------------------------- Footer ---------------------------------------- -->


    <!-- Chart.js -->
    <script th:inline="javascript">
        // Use Thymeleaf to inject Java lists directly into JavaScript arrays
         workoutCalories = /*[[${calories}]]*/
         workoutLabels = /*[[${workoutNames}]]*/
         workoutDurations = /*[[${durations}]]*/

        document.addEventListener('DOMContentLoaded', function () {
            // Get the canvas context
            const ctx = document.getElementById('workoutChart').getContext('2d');

            // Create the chart
            const workoutChart = new Chart(ctx, {
                type: 'bar', // Type of the chart (bar chart)
                data: {
                    labels: workoutLabels,  // Workout names as labels
                    datasets: [{
                        label: 'Duration (minutes)',
                        data: workoutDurations,  // Data for workout durations
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }, {
                        label: 'Calories Burned',
                        data: workoutCalories,  // Data for calories burned
                        backgroundColor: 'rgba(153, 102, 255, 0.2)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true  // Start y-axis from zero
                        }
                    }
                }
            });
        });
    </script>
