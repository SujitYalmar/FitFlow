<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Workout</title>
</head>
<body>
<section>
    <section class="ff-form-page">
        <div class="ff-form-copy">
            <p class="ff-kicker">Workout log</p>
            <h1>Add a workout</h1>
            <p>Keep the form short and record the details that matter for progress.</p>
        </div>
        <form class="ff-form-card" action="/workouts" method="post">
            <label for="description">Workout name</label>
            <input type="text" id="description" name="description" placeholder="Morning strength" required>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <div class="ff-form-row">
                <div>
                    <label for="duration">Duration</label>
                    <input type="number" id="duration" name="duration" placeholder="30" required>
                </div>
                <div>
                    <label for="caloriesBurned">Calories</label>
                    <input type="number" id="caloriesBurned" name="caloriesBurned" placeholder="240" required>
                </div>
            </div>

            <label for="runSteps">Steps</label>
            <input type="number" id="runSteps" name="runSteps" placeholder="3000" required>

            <label for="running">Running</label>
            <select id="running" name="running" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label for="gymExercises">Main exercise</label>
            <select id="gymExercises" name="gymExercises" required>
                <option value="Squats">Squats</option>
                <option value="Bench Press">Bench Press</option>
                <option value="Deadlift">Deadlift</option>
                <option value="Pull-up">Pull-up</option>
                <option value="Lunges">Lunges</option>
            </select>

            <input type="hidden" name="userEmail" th:value="${userEmail}">
            <button class="ff-btn ff-btn-primary" type="submit">Save Workout</button>
            <a class="ff-form-link" href="/workouts">Back to workouts</a>
        </form>
    </section>
</section>
</body>
</html>
