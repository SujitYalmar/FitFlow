<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Form</title>
	
	 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    
    <style>
        body {
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
        }
		.bck-btn{
		 margin-left:2rem;
		 font-size:25px;
		 }

        .container {
            max-width: 1000px;
			
        }
        .form-section, .nutrition-info {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-title, .nutrition-title {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .nutrition-result {
            background-color: #f7f7f7;
            border-radius: 8px;
            padding: 20px;
        }
        .nutrition-result ul {
            list-style: none;
            padding: 0;
        }
        .nutrition-result li {
            font-size: 18px;
            padding: 5px 0;
        }
        .nutrition-result .label {
            font-weight: bold;
        }
        .btn-toggle {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<section>
	<div class="bck-btn">
	<a href="/" style="text-decoration: none;">
	<i class="fa fa-arrow-circle-left"></i>Back</a>
	</div>
    <div class="container">
        <h1 class="mt-5">Nutrition Information</h1>

        <!-- Row for both functionalities -->
        <div class="row">
            <!-- Left Column: Search and View Nutrition Info -->
            <div class="col-md-6">
                <!-- Search Bar Form -->
                <div class="form-section">
                    <h2 class="form-title">Search Nutrition</h2>
                    <form th:action="@{/search}" method="get">
                        <div class="form-group">
                            <label for="foodNameSearch">Search Food by Name:</label>
                            <input type="text" id="foodNameSearch" name="foodName" class="form-control" required />
                        </div>
                        <button type="submit" class="btn btn-primary">Search</button>
                    </form>
					<div th:if="${nutrition == null}" class="mt-4 alert alert-warning">
					    Sorry, no nutrition information found for the food you searched. Please try another food.
					</div>

                    <!-- Display Search Results -->
                    <div th:if="${nutrition != null}" class="nutrition-info mt-5">
                        <h2 class="nutrition-title">Nutrition Details for <span th:text="${nutrition.foodName}"></span>:</h2>
                        <ul>
                            <li><strong>Calories:</strong> <span th:text="${nutrition.calories}"></span></li>
                            <li><strong>Fat:</strong> <span th:text="${nutrition.fat}"></span> g</li>
                            <li><strong>Protein:</strong> <span th:text="${nutrition.protein}"></span> g</li>
                            <li><strong>Carbs:</strong> <span th:text="${nutrition.carbs}"></span> g</li>
                        </ul>
                    </div>

                    <!-- Display "Not Found" Message if Nutrition is Null -->
                </div>
            </div>

            <!-- Right Column: Add New Nutrition Info -->
            <div class="col-md-6">
                <!-- Add New Nutrition Form -->
                <div class="form-section">
                    <h2 class="form-title">Add New Nutrition Info</h2>
                    <form th:action="@{/}" th:object="${nutrition}" method="post">
                        <div class="form-group">
                            <label for="foodName">Food Name:</label>
                            <input type="text" id="foodName" th:field="*{foodName}" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="calories">Calories:</label>
                            <input type="number" id="calories" th:field="*{calories}" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="fat">Fat (g):</label>
                            <input type="number" id="fat" th:field="*{fat}" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="protein">Protein (g):</label>
                            <input type="number" id="protein" th:field="*{protein}" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="carbs">Carbohydrates (g):</label>
                            <input type="number" id="carbs" th:field="*{carbs}" class="form-control" required />
                        </div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
            </div>
        </div> <!-- End of Row -->

    </div>
</section>

<!-- Bootstrap JS and jQuery -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
