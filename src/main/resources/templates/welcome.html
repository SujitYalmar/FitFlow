<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Report</title>
</head>
<body>
<section>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <section class="ff-page-header">
        <div>
            <p class="ff-kicker">Workout report</p>
            <h1>Your activity snapshot.</h1>
            <p>Compare duration and calories burned across your logged workouts.</p>
        </div>
        <a class="ff-btn ff-btn-secondary" href="workouts">Manage Workouts</a>
    </section>

    <section class="ff-section">
        <div class="ff-report-card">
            <canvas id="workoutChart"></canvas>
        </div>
    </section>

    <script th:inline="javascript">
        const workoutCalories = /*[[${calories}]]*/ [];
        const workoutLabels = /*[[${workoutNames}]]*/ [];
        const workoutDurations = /*[[${durations}]]*/ [];

        document.addEventListener('DOMContentLoaded', function () {
            const ctx = document.getElementById('workoutChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: workoutLabels,
                    datasets: [{
                        label: 'Duration (minutes)',
                        data: workoutDurations,
                        backgroundColor: 'rgba(16, 125, 102, 0.16)',
                        borderColor: '#107d66',
                        borderWidth: 2
                    }, {
                        label: 'Calories Burned',
                        data: workoutCalories,
                        backgroundColor: 'rgba(255, 138, 61, 0.18)',
                        borderColor: '#ff8a3d',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        });
    </script>

    <footer class="ff-footer">
        <h3>FitFlow</h3>
        <p>Know what changed, then keep moving.</p>
    </footer>
</section>
</body>
</html>
