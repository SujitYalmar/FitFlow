<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
<section class="auth-page register-page">
    <div class="auth-copy">
        <p class="ff-kicker">Join FitFlow</p>
        <h1>Create a profile that fits your goal.</h1>
        <p>Set your goal once, then use the same account for workouts, yoga, reports, and food tools.</p>
    </div>

    <form class="auth-card auth-card-large" action="saveUser" method="post">
        <h2>Register</h2>
        <th:block th:if="${session.msg}">
            <p class="auth-message success">[[${session.msg}]]</p>
            <th:block th:text="${@userServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <label for="name">Full name</label>
        <input id="name" type="text" name="name" placeholder="Your name" required>

        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="you@example.com" required>

        <label for="mobileNo">Mobile number</label>
        <input id="mobileNo" type="tel" name="mobileNo" pattern="\d{10,}" placeholder="10 digit mobile number" required>

        <label for="password">Password</label>
        <div class="password-field">
            <input type="password" id="password" name="password" required
                   minlength="8"
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                   title="Password must be at least 8 characters long, contain uppercase, lowercase, number, and special character.">
            <button type="button" onclick="togglePasswordVisibility()" aria-label="Show or hide password">Show</button>
        </div>

        <label for="fitness_goal">Fitness goal</label>
        <input id="fitness_goal" type="text" name="fitness_goal" placeholder="Build strength, lose weight, improve mobility..." required>

        <button type="submit" class="button1">Create Account</button>
        <p class="auth-footnote">Already have an account? <a href="/signin">Sign in</a></p>
    </form>

    <script>
        function togglePasswordVisibility() {
            const passwordField = document.getElementById("password");
            const button = event.currentTarget;
            const isHidden = passwordField.type === "password";
            passwordField.type = isHidden ? "text" : "password";
            button.textContent = isHidden ? "Hide" : "Show";
        }
    </script>
</section>
</body>
</html>
