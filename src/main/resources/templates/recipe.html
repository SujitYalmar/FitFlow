<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Search</title>
</head>
<body>
<section>
    <section class="ff-page-header">
        <div>
            <p class="ff-kicker">Diet tab</p>
            <h1>Find food that fits.</h1>
            <p>Search recipes or specific foods and review nutrition details in one focused view.</p>
        </div>
        <a class="ff-btn ff-btn-secondary" href="home1">Back to Progress</a>
    </section>

    <section class="ff-section">
        <div class="ff-search-panel">
            <div class="ff-field">
                <label for="recipe">Recipe details</label>
                <input type="text" id="recipe" placeholder="Example: high protein breakfast">
                <button class="ff-btn ff-btn-primary" id="recipeBtn" type="button">Find Recipes</button>
            </div>
            <div class="ff-field">
                <label for="food">Specific food</label>
                <input type="text" id="food" placeholder="Example: banana">
                <button class="ff-btn ff-btn-secondary" id="foodBtn" type="button">Find Food</button>
            </div>
        </div>
        <div class="holder ff-results"></div>
    </section>

    <script src="/js/recipe.js"></script>
</section>
</body>
</html>
