<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Workout</title>
</head>
<body>
<section>
    <section class="ff-form-page">
        <div class="ff-form-copy">
            <p class="ff-kicker">Workout log</p>
            <h1>Edit workout</h1>
            <p>Update your saved workout details and keep your report accurate.</p>
        </div>
        <form class="ff-form-card" th:action="@{/workouts/edit/{id}(id=${workout.id})}" th:object="${workout}" method="post">
            <label for="description">Workout name</label>
            <input type="text" id="description" th:field="*{description}" required>

            <label for="date">Date</label>
            <input type="date" id="date" th:field="*{date}" required>

            <div class="ff-form-row">
                <div>
                    <label for="duration">Duration</label>
                    <input type="number" id="duration" th:field="*{duration}" required>
                </div>
                <div>
                    <label for="caloriesBurned">Calories</label>
                    <input type="number" id="caloriesBurned" th:field="*{caloriesBurned}" required>
                </div>
            </div>

            <label for="steps">Steps</label>
            <input type="number" id="steps" th:field="*{runSteps}" required>

            <label for="gymExercises">Main exercise</label>
            <select id="gymExercises" th:field="*{gymExercises}">
                <option value="Squats">Squats</option>
                <option value="Bench Press">Bench Press</option>
                <option value="Deadlift">Deadlift</option>
                <option value="Pull-up">Pull-up</option>
                <option value="Lunges">Lunges</option>
            </select>

            <button class="ff-btn ff-btn-primary" type="submit">Update Workout</button>
            <a class="ff-form-link" href="/workouts">Back to workouts</a>
        </form>
    </section>
</section>
</body>
</html>
